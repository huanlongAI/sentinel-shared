# ============================================================================
# Cascade Verification — sentinel-shared hub change → fan-out to all spokes
# Triggers when precheck scripts or reusable workflow change
# Uses CASCADE_TOKEN (PAT with repo scope) for cross-repo dispatch
# ============================================================================
name: Cascade Verification

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - '.github/workflows/consistency-sentinel.yml'
      - 'matrix/**'
      - 'profiles/**'
      - 'prompts/**'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual cascade trigger'
        required: false
        default: 'Manual verification'
        type: string

permissions:
  contents: read
  issues: write

env:
  DOWNSTREAM_REPOS: >-
    tzhOS
    tzh-Harness
    tzh-agent-configs
    tzh-evals
    tzh-dotfiles
    tzh-legal
    tzh-marketing
    guanghe
    tzhOS-App
    super-founder
    hl-platform
    hl-framework
    hl-factory
    hl-dispatch
    hl-contracts
    hl-console-native team-memory

jobs:
  fan-out:
    runs-on: ubuntu-latest
    outputs:
      triggered: ${{ steps.dispatch.outputs.triggered }}
      failed: ${{ steps.dispatch.outputs.failed }}
    steps:
      - name: Determine trigger context
        id: context
        env:
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "reason=${{ inputs.reason }}" >> "$GITHUB_OUTPUT"
          else
            COMMIT_MSG=$(echo "$HEAD_COMMIT_MESSAGE" | head -1)
            echo "reason=Auto-cascade: ${COMMIT_MSG}" >> "$GITHUB_OUTPUT"
          fi
          echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "trigger_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Fan-out repository_dispatch to all downstream repos
        id: dispatch
        env:
          GH_TOKEN: ${{ secrets.CASCADE_TOKEN }}
        run: |
          TRIGGERED=""
          FAILED=""

          for REPO in $DOWNSTREAM_REPOS; do
            echo "::group::Dispatching to ${REPO}"
            RESULT=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/huanlongAI/${REPO}/dispatches" \
              -d "{\"event_type\":\"sentinel-cascade\",\"client_payload\":{\"source_sha\":\"${{ github.sha }}\",\"reason\":\"${{ steps.context.outputs.reason }}\"}}")

            if [ "$RESULT" = "204" ]; then
              echo "✅ ${REPO}: dispatched (HTTP ${RESULT})"
              TRIGGERED="${TRIGGERED}${REPO},"
            else
              echo "❌ ${REPO}: failed (HTTP ${RESULT})"
              FAILED="${FAILED}${REPO},"
            fi
            echo "::endgroup::"

            # Rate limit: 100ms between dispatches
            sleep 0.1
          done

          echo "triggered=${TRIGGERED}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"

          if [ -n "$FAILED" ]; then
            echo "::error::Some dispatches failed: ${FAILED}"
            exit 1
          fi

  collect-results:
    needs: fan-out
    runs-on: ubuntu-latest
    # Wait for downstream workflows to complete
    if: always()
    steps:
      - name: Wait for downstream workflows
        run: |
          echo "Waiting briefly for downstream sentinel runs to start..."
          sleep 20

      - name: Collect downstream results
        id: results
        env:
          GH_TOKEN: ${{ secrets.CASCADE_TOKEN }}
        run: |
          CASCADE_WAIT_TIMEOUT_SECONDS="${CASCADE_WAIT_TIMEOUT_SECONDS:-900}"
          CASCADE_POLL_INTERVAL_SECONDS="${CASCADE_POLL_INTERVAL_SECONDS:-20}"
          DISPATCH_FAILED="${{ needs.fan-out.outputs.failed }}"
          TRIGGER_TIME="${{ needs.fan-out.outputs.triggered && 'set' || 'unset' }}"
          deadline=$((SECONDS + CASCADE_WAIT_TIMEOUT_SECONDS))

          while true; do
            PASS=0
            FAIL=0
            SKIP=0
            API_ERROR=0
            REPORT=""

            for REPO in $DOWNSTREAM_REPOS; do
              # Get the most recent sentinel workflow run
              RUN_RESPONSE_FILE="$(mktemp)"
              RUN_HTTP_STATUS=$(curl -sS -o "$RUN_RESPONSE_FILE" -w "%{http_code}" \
                -H "Authorization: token ${GH_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/huanlongAI/${REPO}/actions/runs?per_page=3&event=repository_dispatch")

              if [ "$RUN_HTTP_STATUS" != "200" ]; then
                REPORT="${REPORT}| ${REPO} | ❌ api_error | actions/runs HTTP ${RUN_HTTP_STATUS} |\n"
                FAIL=$((FAIL + 1))
                API_ERROR=$((API_ERROR + 1))
                continue
              fi

              RUN_DATA=$(jq -r '.workflow_runs[0] // empty' "$RUN_RESPONSE_FILE")

              if [ -z "$RUN_DATA" ]; then
                REPORT="${REPORT}| ${REPO} | ⏭️ skip | No dispatch run found |\n"
                SKIP=$((SKIP + 1))
                continue
              fi

              CONCLUSION=$(echo "$RUN_DATA" | jq -r '.conclusion // "pending"')
              RUN_URL=$(echo "$RUN_DATA" | jq -r '.html_url // "N/A"')

              case "$CONCLUSION" in
                success)
                  REPORT="${REPORT}| ${REPO} | ✅ pass | [Run](${RUN_URL}) |\n"
                  PASS=$((PASS + 1))
                  ;;
                failure)
                  REPORT="${REPORT}| ${REPO} | ❌ fail | [Run](${RUN_URL}) |\n"
                  FAIL=$((FAIL + 1))
                  ;;
                *)
                  REPORT="${REPORT}| ${REPO} | ⏳ ${CONCLUSION} | [Run](${RUN_URL}) |\n"
                  SKIP=$((SKIP + 1))
                  ;;
              esac
            done

            echo "Cascade poll: pass=${PASS}, fail=${FAIL}, skip=${SKIP}"
            if [ "$API_ERROR" -gt 0 ] || [ "$SKIP" -eq 0 ] || [ "$SECONDS" -ge "$deadline" ]; then
              break
            fi

            sleep "$CASCADE_POLL_INTERVAL_SECONDS"
          done

          echo "pass=${PASS}" >> "$GITHUB_OUTPUT"
          echo "fail=${FAIL}" >> "$GITHUB_OUTPUT"
          echo "skip=${SKIP}" >> "$GITHUB_OUTPUT"
          echo "dispatch_failed=${DISPATCH_FAILED}" >> "$GITHUB_OUTPUT"

          # Write report to file for the issue body
          printf "| Repo | Status | Details |\n|------|--------|--------|\n${REPORT}" > /tmp/cascade-report.md

          TOTAL=$((PASS + FAIL + SKIP))
          echo "## Cascade Verification Summary" > /tmp/cascade-summary.md
          echo "" >> /tmp/cascade-summary.md
          echo "**Trigger**: ${{ github.sha }} (${{ github.event_name }})" >> /tmp/cascade-summary.md
          echo "**Dispatch failures**: ${DISPATCH_FAILED:-none}" >> /tmp/cascade-summary.md
          echo "**Results**: ${PASS}/${TOTAL} pass, ${FAIL} fail, ${SKIP} skip/pending" >> /tmp/cascade-summary.md
          echo "" >> /tmp/cascade-summary.md
          cat /tmp/cascade-report.md >> /tmp/cascade-summary.md

          if [ -n "$DISPATCH_FAILED" ] || [ "$FAIL" -gt 0 ] || [ "$SKIP" -gt 0 ]; then
            echo "::error::Cascade verification incomplete or failed: dispatch_failed=${DISPATCH_FAILED:-none}, fail=${FAIL}, skip=${SKIP}"
            exit 1
          fi

      - name: Create issue if failures detected
        if: always() && (steps.results.outputs.fail != '0' || steps.results.outputs.skip != '0' || needs.fan-out.outputs.failed != '')
        env:
          GH_TOKEN: ${{ secrets.CASCADE_TOKEN }}
        run: |
          BODY=$(cat /tmp/cascade-summary.md)
          ISSUE_HTTP_STATUS=$(curl -sS -o /tmp/cascade-issue-response.json -w "%{http_code}" -X POST \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/huanlongAI/sentinel-shared/issues" \
            -d "$(jq -n \
              --arg title "🚨 Cascade Verification: ${{ steps.results.outputs.fail }} failed / ${{ steps.results.outputs.skip }} incomplete" \
              --arg body "$BODY" \
              '{title: $title, body: $body, labels: ["cascade-failure"]}')")

          if [ "$ISSUE_HTTP_STATUS" != "201" ]; then
            echo "::error::Cascade failure issue creation failed: HTTP ${ISSUE_HTTP_STATUS}"
            cat /tmp/cascade-issue-response.json
            exit 1
          fi

      - name: Output summary
        if: always()
        run: |
          echo "## Cascade Verification Results" >> $GITHUB_STEP_SUMMARY
          cat /tmp/cascade-summary.md >> $GITHUB_STEP_SUMMARY
