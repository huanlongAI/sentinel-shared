name: Matrix Auto-Update
on:
  workflow_dispatch:
    inputs:
      ruling_id:
        description: 'Ruling ID (e.g., R-0082)'
        required: true
        type: string
      matrix_change_b64:
        description: 'Base64-encoded matrix change description'
        required: true
        type: string
      source_pr:
        description: 'Source ruling PR URL'
        required: false
        default: 'N/A'
        type: string
      llm_provider:
        description: 'LLM provider: auto prefers HeiyuCode and falls back to Anthropic'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - heiyucode
          - anthropic
permissions:
  contents: write
  pull-requests: write
jobs:
  draft-matrix-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Decode matrix change description
        id: decode
        run: |
          RULING_ID="${{ inputs.ruling_id }}"
          MATRIX_CHANGE_B64="${{ inputs.matrix_change_b64 }}"
          SOURCE_PR="${{ inputs.source_pr }}"
          MATRIX_CHANGE=$(echo "$MATRIX_CHANGE_B64" | base64 --decode 2>/dev/null || echo "Failed to decode")
          echo "ruling_id=${RULING_ID}" >> "$GITHUB_OUTPUT"
          echo "source_pr=${SOURCE_PR}" >> "$GITHUB_OUTPUT"
          echo "$MATRIX_CHANGE" > /tmp/matrix_change_desc.txt
          cat /tmp/matrix_change_desc.txt
      - name: Draft matrix update via LLM provider
        id: draft
        env:
          SENTINEL_LLM_PROVIDER: ${{ inputs.llm_provider || 'auto' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HEIYUCODE_AUTH_TOKEN: ${{ secrets.HEIYUCODE_AUTH_TOKEN }}
          HEIYUCODE_API_KEY: ${{ secrets.HEIYUCODE_API_KEY }}
          HEIYUCODE_BASE_URL: ${{ vars.HEIYUCODE_BASE_URL }}
          HEIYUCODE_API_URL: ${{ vars.HEIYUCODE_API_URL }}
          HEIYUCODE_MODEL: ${{ vars.HEIYUCODE_MODEL }}
          HEIYUCODE_CLIENT_TIMEOUT_SECONDS: ${{ vars.HEIYUCODE_CLIENT_TIMEOUT_SECONDS || '120' }}
          LLM_MODEL: ${{ vars.SENTINEL_LLM_MODEL || 'claude-sonnet-4-6' }}
          LLM_MAX_TOKENS: '8192'
        run: |
          CURRENT_MATRIX=$(cat matrix/sentinel-matrix.yaml)
          MATRIX_CHANGE=$(cat /tmp/matrix_change_desc.txt)
          RULING_ID="${{ steps.decode.outputs.ruling_id }}"
          SYSTEM_PROMPT="You are a Sentinel matrix configuration specialist. Given the current sentinel-matrix.yaml and a change description from a governance ruling, produce the COMPLETE updated sentinel-matrix.yaml file. Preserve all existing structure and comments. Only modify the parts described in the change. If the change is unclear, add a YAML comment marking the uncertain section. Output ONLY the YAML content, no markdown fencing or explanations."
          USER_PROMPT="Current matrix/sentinel-matrix.yaml:
          ${CURRENT_MATRIX}
          ---
          Ruling ${RULING_ID} requests this matrix change:
          ${MATRIX_CHANGE}
          ---
          Produce the complete updated sentinel-matrix.yaml with this change applied."
          SYSTEM_PROMPT_FILE="$(mktemp)"
          USER_PROMPT_FILE="$(mktemp)"
          LLM_OUTPUT_FILE="$(mktemp)"
          cleanup_llm_files() {
            rm -f "$SYSTEM_PROMPT_FILE" "$USER_PROMPT_FILE" "$LLM_OUTPUT_FILE"
          }
          trap cleanup_llm_files EXIT
          printf '%s' "$SYSTEM_PROMPT" > "$SYSTEM_PROMPT_FILE"
          printf '%s' "$USER_PROMPT" > "$USER_PROMPT_FILE"

          UPDATED_MATRIX=""
          if LLM_SYSTEM_PROMPT_FILE="$SYSTEM_PROMPT_FILE" \
            LLM_USER_PROMPT_FILE="$USER_PROMPT_FILE" \
            LLM_OUTPUT_FILE="$LLM_OUTPUT_FILE" \
            bash scripts/llm-message-client.sh; then
            UPDATED_MATRIX=$(cat "$LLM_OUTPUT_FILE")
          fi

          if [ -n "$UPDATED_MATRIX" ] && [ ${#UPDATED_MATRIX} -gt 100 ]; then
            echo "$UPDATED_MATRIX" > matrix/sentinel-matrix.yaml
            echo "draft_success=true" >> "$GITHUB_OUTPUT"
          else
            echo "draft_success=false" >> "$GITHUB_OUTPUT"
            echo "$MATRIX_CHANGE" > /tmp/matrix_change_for_issue.txt
          fi
      - name: Create PR with matrix update
        if: steps.draft.outputs.draft_success == 'true'
        env:
          GH_TOKEN: ${{ secrets.CASCADE_TOKEN }}
          RULING_ID: ${{ steps.decode.outputs.ruling_id }}
          SOURCE_PR: ${{ steps.decode.outputs.source_pr }}
        run: |
          BRANCH="matrix-update/${RULING_ID}"
          git checkout -b "$BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add matrix/sentinel-matrix.yaml
          if git diff --cached --quiet; then echo "No changes"; exit 0; fi
          git commit -m "matrix(auto): update sentinel-matrix.yaml per ${RULING_ID}"
          git push origin "$BRANCH"
          gh pr create \
            --title "matrix(auto): ${RULING_ID} sentinel-matrix update" \
            --body "## Matrix Auto-Update - ${RULING_ID}
          **Source**: [Ruling PR](${SOURCE_PR})
          **Generated by**: Matrix Auto-Update workflow (CONSEN-SPEC S5.2)
          > This PR was auto-drafted. Manual review is REQUIRED before merge."
      - name: Create issue if LLM draft failed
        if: steps.draft.outputs.draft_success == 'false'
        env:
          GH_TOKEN: ${{ secrets.CASCADE_TOKEN }}
          RULING_ID: ${{ steps.decode.outputs.ruling_id }}
          SOURCE_PR: ${{ steps.decode.outputs.source_pr }}
        run: |
          MATRIX_CHANGE=$(cat /tmp/matrix_change_for_issue.txt 2>/dev/null || echo "N/A")
          gh issue create \
            --title "Manual matrix update needed: ${RULING_ID}" \
            --body "## Manual Matrix Update Required - ${RULING_ID}
          The automated draft failed. Source: [Ruling PR](${SOURCE_PR})
          Requested Change: ${MATRIX_CHANGE}
          Please manually update matrix/sentinel-matrix.yaml."
