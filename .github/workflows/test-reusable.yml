name: Test Reusable
on:
  workflow_call:
    inputs:
      skip_llm:
        required: false
        default: 'false'
        type: string
    secrets:
      ANTHROPIC_API_KEY:
        required: false
jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - run: echo 'job-level permissions works'
