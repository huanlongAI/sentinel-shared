name: Test Reusable
on:
  workflow_call:
    inputs:
      skip_llm:
        description: 'skip'
        required: false
        default: 'false'
        type: string
    secrets:
      ANTHROPIC_API_KEY:
        required: false
permissions:
  contents: read
  pull-requests: write
  issues: write
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/checkout@v4
        with:
          repository: huanlongAI/sentinel-shared
          path: .sentinel-shared
          token: ${{ github.token }}
      - run: echo 'Multi-checkout works!' && ls -la .sentinel-shared/
