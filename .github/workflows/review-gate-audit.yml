name: Review Gate Audit

on:
  workflow_dispatch:
    inputs:
      repos:
        description: Space-separated repositories to audit
        required: false
        default: "hl-platform hl-framework hl-factory hl-dispatch hl-contracts hl-console-native team-memory"
        type: string
      limit:
        description: Merged PRs per repository to inspect
        required: false
        default: "30"
        type: string
      lookback_days:
        description: Days of merged PR history to audit; use all for full audit
        required: false
        default: "7"
        type: string
      merged_since:
        description: Explicit UTC lower bound, overrides lookback_days when set
        required: false
        default: ""
        type: string
      effective_after:
        description: ISO-8601 merge time after which reviewless merges fail the audit
        required: false
        default: "2026-06-04T06:36:06Z"
        type: string
      override_actors:
        description: Space-separated actors allowed to record structured review gate overrides
        required: false
        default: ""
        type: string
  schedule:
    - cron: '20 1 * * *'

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Audit merged PR review gate evidence
        env:
          GH_TOKEN: ${{ secrets.REVIEW_GATE_AUDIT_TOKEN || secrets.CASCADE_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          REVIEW_GATE_AUDIT_REPOS: ${{ inputs.repos || 'hl-platform hl-framework hl-factory hl-dispatch hl-contracts hl-console-native team-memory' }}
          REVIEW_GATE_AUDIT_LIMIT: ${{ inputs.limit || '30' }}
          REVIEW_GATE_AUDIT_LOOKBACK_DAYS: ${{ inputs.lookback_days || '7' }}
          REVIEW_GATE_AUDIT_MERGED_SINCE: ${{ inputs.merged_since || '' }}
          REVIEW_GATE_AUDIT_EFFECTIVE_AFTER: ${{ inputs.effective_after || '2026-06-04T06:36:06Z' }}
          REVIEW_GATE_AUDIT_OVERRIDE_ACTORS: ${{ inputs.override_actors || vars.REVIEW_GATE_AUDIT_OVERRIDE_ACTORS || '' }}
        run: bash scripts/review-gate-audit.sh
