name: Sentinel Auto-Fix
on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Target repo name (e.g. tzhOS-App)'
        required: true
        type: string
      check_id:
        description: 'Check to fix: D-2 (terminology) or D-6 (brand-token)'
        required: true
        type: choice
        options:
          - D-2
          - D-6
      dry_run:
        description: 'Preview only, do not create PR'
        required: false
        default: 'true'
        type: boolean

permissions:
  contents: read

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sentinel-shared
        uses: actions/checkout@v4
        with:
          path: sentinel-shared

      - name: Clone target repo
        env:
          GH_TOKEN: ${{ secrets.CASCADE_TOKEN }}
        run: |
          git clone --depth 5 \
            "https://x-access-token:${GH_TOKEN}@github.com/huanlongAI/${{ inputs.target_repo }}.git" \
            target-repo
          echo "Cloned huanlongAI/${{ inputs.target_repo }}"

      - name: Run precheck to get fresh violations
        id: precheck
        working-directory: target-repo
        env:
          CONFIG_FILE: .sentinel/config.yaml
          RESULTS_DIR: .sentinel/results
        run: |
          mkdir -p .sentinel/results
          CHECK="${{ inputs.check_id }}"

          case "$CHECK" in
            D-2)
              SCRIPT="../sentinel-shared/scripts/precheck-terminology.sh"
              RESULT_FILE=".sentinel/results/d2-terminology.json"
              ;;
            D-6)
              SCRIPT="../sentinel-shared/scripts/precheck-brand-token.sh"
              RESULT_FILE=".sentinel/results/d6-brand-token.json"
              ;;
            *)
              echo "Unsupported check: $CHECK"
              exit 1
              ;;
          esac

          if [ ! -f "$SCRIPT" ]; then
            echo "Script not found: $SCRIPT"
            exit 1
          fi

          # Run precheck (allow failure -- we expect it to fail)
          bash "$SCRIPT" || true

          if [ ! -f "$RESULT_FILE" ]; then
            echo "Result file not generated: $RESULT_FILE"
            echo "has_violations=false" >> "$GITHUB_OUTPUT"
          else
            PASSED=$(jq -r 'if .passed == null then "true" else (.passed | tostring) end' "$RESULT_FILE")
            if [ "$PASSED" = "true" ]; then
              echo "Check $CHECK passed -- nothing to fix"
              echo "has_violations=false" >> "$GITHUB_OUTPUT"
            else
              echo "has_violations=true" >> "$GITHUB_OUTPUT"
              echo "result_file=$RESULT_FILE" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Generate LLM fixes
        if: steps.precheck.outputs.has_violations == 'true'
        id: fix
        working-directory: target-repo
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          RESULT_FILE="${{ steps.precheck.outputs.result_file }}"
          bash ../sentinel-shared/scripts/auto-fix.sh \
            "${{ inputs.check_id }}" \
            "$RESULT_FILE" \
            "."

          PATCH_FILE=".sentinel/results/auto-fix-patch.sh"
          if [ -f "$PATCH_FILE" ]; then
            CMD_COUNT=$(grep -c "^sed -i " "$PATCH_FILE" || echo "0")
            echo "fix_count=$CMD_COUNT" >> "$GITHUB_OUTPUT"
            echo "has_fixes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_fixes=false" >> "$GITHUB_OUTPUT"
            echo "fix_count=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply fixes (non-dry-run)
        if: |
          steps.fix.outputs.has_fixes == 'true' &&
          steps.fix.outputs.fix_count != '0' &&
          inputs.dry_run == 'false'
        working-directory: target-repo
        env:
          GH_TOKEN: ${{ secrets.CASCADE_TOKEN }}
        run: |
          PATCH_FILE=".sentinel/results/auto-fix-patch.sh"
          REPO="${{ inputs.target_repo }}"
          CHECK="${{ inputs.check_id }}"
          BRANCH="sentinel-auto-fix-$(echo "$CHECK" | tr '[:upper:]' '[:lower:]')"

          # Configure git
          git config user.name "Sentinel Auto-Fix"
          git config user.email "sentinel@huanlongai.com"

          # Create branch
          git checkout -b "$BRANCH"

          # Apply patch (sed commands only)
          echo "Applying fixes..."
          bash "$PATCH_FILE" || {
            echo "Some fix commands failed -- continuing with partial fixes"
          }

          # Check if anything changed
          if git diff --quiet; then
            echo "No files were modified after applying fixes"
            exit 0
          fi

          # Stage and commit
          git add -A
          CHANGED_FILES=$(git diff --cached --name-only | wc -l | tr -d ' ')
          git commit -m "fix(sentinel): auto-fix $CHECK violations ($CHANGED_FILES files)

Generated by Sentinel Auto-Fix (LLM-assisted).
Review carefully before merging.

Check: $CHECK
Repo: huanlongAI/$REPO
Fixes: ${{ steps.fix.outputs.fix_count }} commands applied"

          # Push branch
          git push "https://x-access-token:${GH_TOKEN}@github.com/huanlongAI/${REPO}.git" \
            "$BRANCH" 2>/dev/null

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Create PR (non-dry-run)
        if: |
          steps.fix.outputs.has_fixes == 'true' &&
          steps.fix.outputs.fix_count != '0' &&
          inputs.dry_run == 'false'
        env:
          GH_TOKEN: ${{ secrets.CASCADE_TOKEN }}
        run: |
          REPO="${{ inputs.target_repo }}"
          CHECK="${{ inputs.check_id }}"
          BRANCH="sentinel-auto-fix-$(echo "$CHECK" | tr '[:upper:]' '[:lower:]')"
          SUMMARY_FILE="target-repo/.sentinel/results/auto-fix-summary.md"

          # Check for existing open auto-fix PR
          EXISTING=$(curl -s \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/huanlongAI/${REPO}/pulls?state=open&head=${BRANCH}&per_page=1" \
            | jq 'length')

          if [ "$EXISTING" != "0" ]; then
            echo "Open auto-fix PR already exists for $BRANCH -- skipping"
            exit 0
          fi

          # Build PR body from summary
          PR_BODY="Auto-generated by Sentinel Auto-Fix workflow.

## What Changed

LLM-assisted fix for **$CHECK** violations detected by Consistency Sentinel.

$(cat "$SUMMARY_FILE" 2>/dev/null || echo 'Summary unavailable.')

## Review Notes

- This PR was generated automatically -- review each change carefully
- Run the full Sentinel CI to verify the fixes resolve the violations
- Label: sentinel-auto-fix"

          PR_URL=$(curl -s -X POST \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/huanlongAI/${REPO}/pulls" \
            -d "$(jq -n \
              --arg title "fix(sentinel): auto-fix $CHECK violations" \
              --arg body "$PR_BODY" \
              --arg head "$BRANCH" \
              --arg base "main" \
              '{title: $title, body: $body, head: $head, base: $base}')" \
            | jq -r '.html_url // "failed"')

          echo "PR created: $PR_URL"

      - name: Step summary
        if: always()
        run: |
          CHECK="${{ inputs.check_id }}"
          REPO="${{ inputs.target_repo }}"
          DRY_RUN="${{ inputs.dry_run }}"
          HAS_VIOLATIONS="${{ steps.precheck.outputs.has_violations }}"
          FIX_COUNT="${{ steps.fix.outputs.fix_count || '0' }}"
          SUMMARY_FILE="target-repo/.sentinel/results/auto-fix-summary.md"

          {
            echo "# Sentinel Auto-Fix: $CHECK on $REPO"
            echo ""
            echo "Mode: $( [ '$DRY_RUN' = 'true' ] && echo 'DRY RUN' || echo 'LIVE')"
            echo "Violations detected: $HAS_VIOLATIONS"
            echo "Fix commands generated: $FIX_COUNT"
            echo ""
            if [ -f "$SUMMARY_FILE" ]; then
              cat "$SUMMARY_FILE"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
