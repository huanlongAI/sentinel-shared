name: Caller Workflow Sync
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Preview only, do not create PRs
        required: false
        default: true
        type: boolean
      target_repos:
        description: Optional space-separated downstream repo subset
        required: false
        default: ''
        type: string
  schedule:
    - cron: '0 0 * * 0'

permissions:
  contents: read

env:
  REPO_MAP_REPO: huanlongAI/tzhOS
  REPO_MAP_PATH: 40-PPR/REPO-MAP.md
  REPO_MAP_REF: main
  TARGET_RESOLVER: scripts/caller-targets.sh

  CANONICAL_BODY: |
    # ============================================================================
    # Consistency Sentinel -- MIRA P-2 Consistency Gate
    # Phase 1: Caller template -> huanlongAI/sentinel-shared reusable workflow
    # NOTE: permissions MUST be in caller, not in reusable workflow
    # The @main reusable workflow reference is intentional for this thin caller projection.
    # Compatibility is governed by sentinel-shared cascade, D-10, and caller-sync drift checks.
    # ============================================================================
    name: Consistency Sentinel
    on:
      pull_request:
        types: [opened, synchronize, reopened]
      push:
        branches: [main]
      repository_dispatch:
        types: [sentinel-cascade]
      workflow_dispatch:
        inputs:
          skip_llm:
            description: 'Skip LLM review layer'
            required: false
            default: false
            type: boolean
    permissions:
      contents: read
      pull-requests: write
      issues: write
    jobs:
      sentinel:
        uses: huanlongAI/sentinel-shared/.github/workflows/consistency-sentinel.yml@main
        secrets:
          # LLM provider credentials are consumed only by sentinel-shared provider router.
          # HeiyuCode is preferred when configured; Anthropic remains the fallback provider.
          ANTHROPIC_API_KEY: __EXPR_ANTHROPIC_API_KEY__
          HEIYUCODE_AUTH_TOKEN: __EXPR_HEIYUCODE_AUTH_TOKEN__
          HEIYUCODE_API_KEY: __EXPR_HEIYUCODE_API_KEY__
        with:
          skip_llm: __EXPR_SKIP_LLM__
          llm_provider: auto
          heiyucode_base_url: __EXPR_HEIYUCODE_BASE_URL__
          heiyucode_model: __EXPR_HEIYUCODE_MODEL__

jobs:
  sync-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check caller workflow drift across repos
        id: drift
        env:
          GH_TOKEN: ${{ secrets.CASCADE_TOKEN }}
        run: |
          DRIFTED=""
          SYNCED=""
          MISSING=""
          SKIPPED=""
          FAILED=""
          DRY_RUN="${{ github.event.inputs.dry_run || 'true' }}"
          TARGET_REPOS_INPUT="${{ github.event.inputs.target_repos || '' }}"
          SELECTED_REPOS=""
          INVALID_TARGETS=""
          REPORT=""

          load_repo_map() {
            local repo_map_file="/tmp/repo-map.md"
            local http_code

            if [ -z "${GH_TOKEN}" ]; then
              echo "::error::CASCADE_TOKEN is not configured" >&2
              return 1
            fi

            http_code="$(curl -s -L -o "$repo_map_file" -w "%{http_code}" \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Accept: application/vnd.github.raw+json" \
              "https://api.github.com/repos/${REPO_MAP_REPO}/contents/${REPO_MAP_PATH}?ref=${REPO_MAP_REF}")"

            if [ "$http_code" != "200" ]; then
              echo "::error::Cannot load REPO-MAP from ${REPO_MAP_REPO}/${REPO_MAP_PATH}@${REPO_MAP_REF} (HTTP ${http_code})" >&2
              return 1
            fi

            echo "$repo_map_file"
          }

          load_downstream_repos() {
            local repo_map_file

            if [ ! -x "$TARGET_RESOLVER" ]; then
              echo "::error::Caller target resolver missing or not executable: ${TARGET_RESOLVER}" >&2
              return 1
            fi

            repo_map_file="$(load_repo_map)" || return 1
            bash "$TARGET_RESOLVER" from-file "$repo_map_file" | tr '\n' ' '
          }

          if ! DOWNSTREAM_REPOS="$(load_downstream_repos)"; then
            FAILED="repo_map_target_load_failed,"
            echo "drifted=" >> "$GITHUB_OUTPUT"
            echo "drift_count=0" >> "$GITHUB_OUTPUT"
            echo "synced=" >> "$GITHUB_OUTPUT"
            echo "missing=" >> "$GITHUB_OUTPUT"
            echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"
            echo "failed_count=1" >> "$GITHUB_OUTPUT"
            {
              echo "## Caller Workflow Sync Report"
              echo ""
              echo "Mode: $( [ "$DRY_RUN" = "true" ] && echo 'DRY RUN (preview only)' || echo 'LIVE (PRs created)')"
              echo "Targets: REPO-MAP load failed"
              echo "Synced: 0 | Drifted: 0 | Missing: 0 | Failed: 1"
              echo ""
              echo "Failed targets: ${FAILED%,}"
            } > /tmp/sync-report.md
            exit 0
          fi

          if [ -z "$DOWNSTREAM_REPOS" ]; then
            FAILED="empty_target_config,"
            echo "::error::REPO-MAP target resolver returned no caller targets"
            echo "drifted=" >> "$GITHUB_OUTPUT"
            echo "drift_count=0" >> "$GITHUB_OUTPUT"
            echo "synced=" >> "$GITHUB_OUTPUT"
            echo "missing=" >> "$GITHUB_OUTPUT"
            echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"
            echo "failed_count=1" >> "$GITHUB_OUTPUT"
            {
              echo "## Caller Workflow Sync Report"
              echo ""
              echo "Mode: $( [ "$DRY_RUN" = "true" ] && echo 'DRY RUN (preview only)' || echo 'LIVE (PRs created)')"
              echo "Targets: ${TARGET_REPOS_INPUT:-from ${REPO_MAP_REPO}/${REPO_MAP_PATH}@${REPO_MAP_REF}}"
              echo "Synced: 0 | Drifted: 0 | Missing: 0 | Failed: 1"
              echo ""
              echo "Failed targets: ${FAILED%,}"
            } > /tmp/sync-report.md
            exit 0
          fi

          if [ -z "$TARGET_REPOS_INPUT" ]; then
            SELECTED_REPOS="$DOWNSTREAM_REPOS"
          else
            for REQUESTED_REPO in $TARGET_REPOS_INPUT; do
              case " $DOWNSTREAM_REPOS " in
                *" $REQUESTED_REPO "*)
                  SELECTED_REPOS="${SELECTED_REPOS}${REQUESTED_REPO} "
                  ;;
                *)
                  INVALID_TARGETS="${INVALID_TARGETS}${REQUESTED_REPO},"
                  ;;
              esac
            done
          fi

          if [ -n "$INVALID_TARGETS" ]; then
            FAILED="invalid_target:${INVALID_TARGETS%,},"
            echo "::error::Invalid caller-sync target(s): ${INVALID_TARGETS%,}"
            echo "drifted=" >> "$GITHUB_OUTPUT"
            echo "drift_count=0" >> "$GITHUB_OUTPUT"
            echo "synced=" >> "$GITHUB_OUTPUT"
            echo "missing=" >> "$GITHUB_OUTPUT"
            echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"
            echo "failed_count=1" >> "$GITHUB_OUTPUT"
            {
              echo "## Caller Workflow Sync Report"
              echo ""
              echo "Mode: $( [ "$DRY_RUN" = "true" ] && echo 'DRY RUN (preview only)' || echo 'LIVE (PRs created)')"
              echo "Targets: ${TARGET_REPOS_INPUT}"
              echo "Synced: 0 | Drifted: 0 | Missing: 0 | Failed: 1"
              echo ""
              echo "Failed targets: ${FAILED%,}"
            } > /tmp/sync-report.md
            exit 0
          fi

          gha_expr() {
            printf '$''{{ %s }}' "$1"
          }

          CANONICAL_BODY="${CANONICAL_BODY//__EXPR_ANTHROPIC_API_KEY__/$(gha_expr 'secrets.ANTHROPIC_API_KEY')}"
          CANONICAL_BODY="${CANONICAL_BODY//__EXPR_HEIYUCODE_AUTH_TOKEN__/$(gha_expr 'secrets.HEIYUCODE_AUTH_TOKEN')}"
          CANONICAL_BODY="${CANONICAL_BODY//__EXPR_HEIYUCODE_API_KEY__/$(gha_expr 'secrets.HEIYUCODE_API_KEY')}"
          CANONICAL_BODY="${CANONICAL_BODY//__EXPR_SKIP_LLM__/$(gha_expr "github.event_name == 'repository_dispatch' || fromJSON(github.event.inputs.skip_llm || 'false')")}"
          CANONICAL_BODY="${CANONICAL_BODY//__EXPR_HEIYUCODE_BASE_URL__/$(gha_expr "vars.HEIYUCODE_BASE_URL || 'https://www.heiyucode.com'")}"
          CANONICAL_BODY="${CANONICAL_BODY//__EXPR_HEIYUCODE_MODEL__/$(gha_expr "vars.HEIYUCODE_MODEL || ''")}"
          CALLER_SYNC_TOKEN_REMEDIATION="CASCADE_TOKEN must have repo read/write access to every selected downstream repo and workflow write permission, because caller-sync updates .github/workflows/consistency-sentinel.yml."
          CALLER_SYNC_COMMIT_MESSAGE="$(cat <<EOF
          chore(sentinel): sync caller workflow to latest template

          Agent-ID: codex-cli
          Run-ID: caller-sync-${GITHUB_RUN_ID}
          WO-ID: sentinel-caller-sync
          Node-ID: NODE-M
          Human-Author: tongzhenghui
          EOF
          )"

          # Normalize canonical: strip comments, leading/trailing whitespace,
          # collapse whitespace for comparison
          CANONICAL_NORM=$(echo "$CANONICAL_BODY" \
            | grep -v '^\s*#' \
            | sed 's/^\s*//' | sed 's/\s*$//' \
            | grep -v '^$' \
            | sort)

          for REPO in $SELECTED_REPOS; do
            echo "::group::Checking ${REPO}"

            # Fetch current caller workflow
            RESP=$(curl -s -w "\n%{http_code}" \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Accept: application/vnd.github.raw+json" \
              "https://api.github.com/repos/huanlongAI/${REPO}/contents/.github/workflows/consistency-sentinel.yml?ref=main")
            HTTP_CODE=$(echo "$RESP" | tail -1)
            BODY=$(echo "$RESP" | sed '$d')

            if [ "$HTTP_CODE" = "404" ]; then
              REPORT="${REPORT}| ${REPO} | MISSING | No caller workflow found |\n"
              MISSING="${MISSING}${REPO},"
              echo "::endgroup::"
              continue
            fi

            if [ "$HTTP_CODE" != "200" ]; then
              REPORT="${REPORT}| ${REPO} | ERROR | HTTP ${HTTP_CODE} |\n"
              SKIPPED="${SKIPPED}${REPO},"
              if [ "$DRY_RUN" = "false" ]; then
                FAILED="${FAILED}${REPO}:fetch_http_${HTTP_CODE},"
              fi
              echo "::endgroup::"
              continue
            fi

            # Normalize fetched: strip comments, leading/trailing whitespace
            FETCHED_NORM=$(echo "$BODY" \
              | grep -v '^\s*#' \
              | sed 's/^\s*//' | sed 's/\s*$//' \
              | grep -v '^$' \
              | sort)

            # Compare structural content (ignoring comments and whitespace)
            if [ "$CANONICAL_NORM" = "$FETCHED_NORM" ]; then
              REPORT="${REPORT}| ${REPO} | OK | In sync |\n"
              SYNCED="${SYNCED}${REPO},"
            else
              REPORT="${REPORT}| ${REPO} | DRIFT | Caller differs from canonical |\n"
              DRIFTED="${DRIFTED}${REPO},"

              if [ "$DRY_RUN" = "false" ]; then
                # Check for existing open sync PR
                EXISTING_RESP=$(curl -s -w "\n%{http_code}" \
                  -H "Authorization: token ${GH_TOKEN}" \
                  -H "Accept: application/vnd.github+json" \
                  "https://api.github.com/repos/huanlongAI/${REPO}/pulls?state=open&head=huanlongAI:sentinel-caller-sync&per_page=1")
                EXISTING_HTTP=$(echo "$EXISTING_RESP" | tail -1)
                EXISTING_BODY=$(echo "$EXISTING_RESP" | sed '$d')

                if [ "$EXISTING_HTTP" != "200" ]; then
                  echo "Existing PR lookup failed (HTTP $EXISTING_HTTP) for ${REPO}"
                  FAILED="${FAILED}${REPO}:existing_pr_http_${EXISTING_HTTP},"
                  echo "::endgroup::"
                  continue
                fi

                EXISTING_PR=$(echo "$EXISTING_BODY" | jq 'length')
                EXISTING_PR_NUMBER=$(echo "$EXISTING_BODY" | jq -r '.[0].number // empty')
                EXISTING_PR_AUTOSYNC=$(echo "$EXISTING_BODY" \
                  | jq -r '.[0] | select(
                    ((.title // "") == "chore(sentinel): sync caller workflow to latest template")
                    or ((.body // "") | contains("sentinel-auto-sync"))
                    or (((.title // "") | startswith("chore(sentinel):")) and ((.body // "") | contains("huanlongAI/sentinel-shared#17")))
                  ) | .number // empty')

                if [ "$EXISTING_PR" != "0" ] && [ -z "$EXISTING_PR_AUTOSYNC" ]; then
                  echo "Existing sentinel-caller-sync PR is not marked as auto-sync for ${REPO}"
                  FAILED="${FAILED}${REPO}:existing_pr_not_autosync,"
                  echo "::endgroup::"
                  continue
                fi

                # Get default branch SHA for creating new branch
                DEFAULT_SHA=$(curl -s \
                  -H "Authorization: token ${GH_TOKEN}" \
                  -H "Accept: application/vnd.github+json" \
                  "https://api.github.com/repos/huanlongAI/${REPO}/git/refs/heads/main" \
                  | jq -r '.object.sha // empty')

                if [ -z "$DEFAULT_SHA" ]; then
                  echo "Cannot resolve main branch SHA for ${REPO}"
                  FAILED="${FAILED}${REPO}:missing_main_sha,"
                  echo "::endgroup::"
                  continue
                fi

                REFRESH_REF_RESULT=""

                if [ "$EXISTING_PR" != "0" ]; then
                  REFRESH_REF_RESULT=$(curl -s -o /tmp/refresh-ref-response.json -w "%{http_code}" -X PATCH \
                    -H "Authorization: token ${GH_TOKEN}" \
                    -H "Accept: application/vnd.github+json" \
                    "https://api.github.com/repos/huanlongAI/${REPO}/git/refs/heads/sentinel-caller-sync" \
                    -d "$(jq -n --arg sha "$DEFAULT_SHA" \
                      '{sha: $sha, force: true}')")
                  if [ "$REFRESH_REF_RESULT" != "200" ]; then
                    echo "Branch refresh failed (HTTP $REFRESH_REF_RESULT) for ${REPO}"
                    FAILED="${FAILED}${REPO}:refresh_ref_http_${REFRESH_REF_RESULT},"
                    echo "::endgroup::"
                    continue
                  fi
                else
                  # Create branch, or reset an orphaned stale sync branch back to main.
                  CREATE_REF_RESULT=$(curl -s -o /tmp/create-ref-response.json -w "%{http_code}" -X POST \
                    -H "Authorization: token ${GH_TOKEN}" \
                    -H "Accept: application/vnd.github+json" \
                    "https://api.github.com/repos/huanlongAI/${REPO}/git/refs" \
                    -d "$(jq -n --arg sha "$DEFAULT_SHA" \
                      '{ref: "refs/heads/sentinel-caller-sync", sha: $sha}')")
                  if [ "$CREATE_REF_RESULT" = "422" ]; then
                    REFRESH_REF_RESULT=$(curl -s -o /tmp/refresh-ref-response.json -w "%{http_code}" -X PATCH \
                      -H "Authorization: token ${GH_TOKEN}" \
                      -H "Accept: application/vnd.github+json" \
                      "https://api.github.com/repos/huanlongAI/${REPO}/git/refs/heads/sentinel-caller-sync" \
                      -d "$(jq -n --arg sha "$DEFAULT_SHA" \
                        '{sha: $sha, force: true}')")
                    if [ "$REFRESH_REF_RESULT" != "200" ]; then
                      echo "Branch refresh failed (HTTP $REFRESH_REF_RESULT) for ${REPO}"
                      FAILED="${FAILED}${REPO}:refresh_ref_http_${REFRESH_REF_RESULT},"
                      echo "::endgroup::"
                      continue
                    fi
                  elif [ "$CREATE_REF_RESULT" != "201" ]; then
                    echo "Branch create failed (HTTP $CREATE_REF_RESULT) for ${REPO}"
                    FAILED="${FAILED}${REPO}:create_ref_http_${CREATE_REF_RESULT},"
                    echo "::endgroup::"
                    continue
                  fi
                fi

                # Get current file SHA for update
                FILE_SHA=$(curl -s \
                  -H "Authorization: token ${GH_TOKEN}" \
                  -H "Accept: application/vnd.github+json" \
                  "https://api.github.com/repos/huanlongAI/${REPO}/contents/.github/workflows/consistency-sentinel.yml?ref=sentinel-caller-sync" \
                  | jq -r '.sha // empty')

                # Update file on branch
                ENCODED=$(echo "$CANONICAL_BODY" | base64 -w0)
                UPDATE_RESPONSE="/tmp/update-response-${REPO}.json"
                UPDATE_RESULT=$(curl -s -o "$UPDATE_RESPONSE" -w "%{http_code}" -X PUT \
                  -H "Authorization: token ${GH_TOKEN}" \
                  -H "Accept: application/vnd.github+json" \
                  "https://api.github.com/repos/huanlongAI/${REPO}/contents/.github/workflows/consistency-sentinel.yml" \
                  -d "$(jq -n \
                    --arg msg "$CALLER_SYNC_COMMIT_MESSAGE" \
                    --arg content "$ENCODED" \
                    --arg sha "$FILE_SHA" \
                    --arg branch "sentinel-caller-sync" \
                    '{message: $msg, content: $content, sha: $sha, branch: $branch}')")

                if [ "$UPDATE_RESULT" = "200" ] || [ "$UPDATE_RESULT" = "201" ]; then
                  if [ "$EXISTING_PR" != "0" ]; then
                    echo "Existing sync PR refreshed: #${EXISTING_PR_NUMBER}"
                  else
                    # Create PR
                    PR_RESP=$(curl -s -w "\n%{http_code}" -X POST \
                      -H "Authorization: token ${GH_TOKEN}" \
                      -H "Accept: application/vnd.github+json" \
                      "https://api.github.com/repos/huanlongAI/${REPO}/pulls" \
                      -d "$(jq -n \
                        --arg title "chore(sentinel): sync caller workflow to latest template" \
                        --arg body "Auto-generated by sentinel caller-sync workflow.\n\nThe caller workflow in this repo has drifted from the canonical template in sentinel-shared. This PR updates it to match.\n\nLabel: sentinel-auto-sync" \
                        --arg head "sentinel-caller-sync" \
                        --arg base "main" \
                        '{title: $title, body: $body, head: $head, base: $base}')")
                    PR_HTTP=$(echo "$PR_RESP" | tail -1)
                    PR_BODY=$(echo "$PR_RESP" | sed '$d')
                    PR_URL=$(echo "$PR_BODY" | jq -r '.html_url // empty')
                    if [ "$PR_HTTP" != "201" ] || [ -z "$PR_URL" ]; then
                      echo "PR create failed (HTTP $PR_HTTP) for ${REPO}"
                      FAILED="${FAILED}${REPO}:create_pr_http_${PR_HTTP},"
                      echo "::endgroup::"
                      continue
                    fi
                    echo "PR created: $PR_URL"
                  fi
                else
                  UPDATE_MESSAGE=$(jq -r '.message // empty' "$UPDATE_RESPONSE" 2>/dev/null || true)
                  if [ "$UPDATE_RESULT" = "403" ] || [ "$UPDATE_RESULT" = "404" ]; then
                    echo "::error title=Caller sync token lacks workflow write access::File update failed (HTTP $UPDATE_RESULT) for ${REPO}. ${CALLER_SYNC_TOKEN_REMEDIATION}"
                    if [ -n "$UPDATE_MESSAGE" ]; then
                      echo "GitHub API message: ${UPDATE_MESSAGE}"
                    fi
                    FAILED="${FAILED}${REPO}:update_http_${UPDATE_RESULT}_token_scope,"
                  else
                    echo "File update failed (HTTP $UPDATE_RESULT) for ${REPO}"
                    if [ -n "$UPDATE_MESSAGE" ]; then
                      echo "GitHub API message: ${UPDATE_MESSAGE}"
                    fi
                    FAILED="${FAILED}${REPO}:update_http_${UPDATE_RESULT},"
                  fi
                fi
              fi
            fi

            echo "::endgroup::"
            sleep 0.2
          done

          # Count results
          DRIFT_COUNT=$(echo "$DRIFTED" | tr ',' '\n' | grep -c . || true)
          SYNC_COUNT=$(echo "$SYNCED" | tr ',' '\n' | grep -c . || true)
          MISS_COUNT=$(echo "$MISSING" | tr ',' '\n' | grep -c . || true)
          FAIL_COUNT=$(echo "$FAILED" | tr ',' '\n' | grep -c . || true)

          echo "drifted=${DRIFTED}" >> "$GITHUB_OUTPUT"
          echo "drift_count=${DRIFT_COUNT}" >> "$GITHUB_OUTPUT"
          echo "synced=${SYNCED}" >> "$GITHUB_OUTPUT"
          echo "missing=${MISSING}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"
          echo "failed_count=${FAIL_COUNT}" >> "$GITHUB_OUTPUT"

          # Build summary
          {
            echo "## Caller Workflow Sync Report"
            echo ""
            echo "Mode: $( [ "$DRY_RUN" = "true" ] && echo 'DRY RUN (preview only)' || echo 'LIVE (PRs created)')"
            echo "Targets: ${SELECTED_REPOS}"
            echo "Synced: ${SYNC_COUNT} | Drifted: ${DRIFT_COUNT} | Missing: ${MISS_COUNT} | Failed: ${FAIL_COUNT}"
            if [ "$FAIL_COUNT" != "0" ]; then
              echo ""
              echo "Failed targets: ${FAILED%,}"
            fi
            echo ""
            printf "| Repo | Status | Details |\n|------|--------|--------|\n${REPORT}"
          } > /tmp/sync-report.md

      - name: Step summary
        if: always()
        run: cat /tmp/sync-report.md >> $GITHUB_STEP_SUMMARY

      - name: Alert on drift
        if: steps.drift.outputs.drift_count != '0'
        env:
          GH_TOKEN: ${{ secrets.CASCADE_TOKEN }}
        run: |
          DRIFTED="${{ steps.drift.outputs.drifted }}"
          COUNT="${{ steps.drift.outputs.drift_count }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'true' }}"
          BODY=$(cat /tmp/sync-report.md)

          if [ "$DRY_RUN" = "true" ]; then
            BODY="${BODY}\n\n> Run with dry_run=false to create sync PRs."
          fi

          # Create or update issue
          EXISTING=$(curl -s \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/huanlongAI/sentinel-shared/issues?state=open&labels=caller-drift&per_page=1" \
            | jq 'length')
          if [ "$EXISTING" = "0" ]; then
            curl -s -X POST \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/huanlongAI/sentinel-shared/issues" \
              -d "$(jq -n \
                --arg title "Caller Sync: ${COUNT} repo(s) drifted from canonical template" \
                --arg body "$BODY" \
                '{title: $title, body: $body, labels: ["caller-drift"]}')"
          fi

      - name: Fail on live sync errors
        if: steps.drift.outputs.failed_count != '0'
        run: |
          echo "::error::Caller sync failed for: ${{ steps.drift.outputs.failed }}"
          exit 1
